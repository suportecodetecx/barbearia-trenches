<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Painel Gestor - Barbearia Trenches</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Oswald:wght@200;300;400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/pacote.png">
    <link rel="apple-touch-icon" href="images/pacote.png">
    <style>
        :root {
            --bg-main: #0a0f1c;
            --bg-alt: #0f172a;
            --blue-primary: #c0d6ef;
            --blue-steel: #1e2a45;
            --blue-light: #7fa6d9;
            --silver-main: #cbd5e1;
            --silver-soft: #94a3b8;
            --silver-light: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--bg-alt) 100%);
            color: var(--silver-main);
            line-height: 1.6;
            padding: 15px;
        }

        .admin-container { max-width: 1400px; margin: 0 auto; }

        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px); border-radius: 20px; margin-bottom: 20px;
            border: 1px solid rgba(192, 214, 239, 0.2); box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-header h1 { color: var(--blue-primary); font-size: 20px; }
        @media (max-width: 768px) {
            .admin-header h1 { font-size: 16px; }
        }
        .logout-btn { background: linear-gradient(135deg, #ff5722, #ff9800); color: #fff; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .logout-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px #ff5722; }

        .filter-bar {
            background: rgba(15, 23, 42, 0.8); border-radius: 20px; padding: 15px; margin-bottom: 20px;
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; border: 1px solid rgba(192, 214, 239, 0.2);
        }
        .filter-bar select, .filter-bar button {
            padding: 10px 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(192, 214, 239, 0.2);
            border-radius: 30px; color: var(--silver-main); font-size: 13px; cursor: pointer;
        }
        .filter-bar button { background: linear-gradient(135deg, var(--blue-steel), var(--blue-primary)); color: #000; font-weight: bold; }

        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; gap: 15px; }
        }

        /* Card de Reservas - Destaque */
        .admin-card.reservas-card {
            order: -1;
            border: 2px solid var(--blue-primary);
            background: rgba(15, 23, 42, 0.95);
        }
        @media (min-width: 769px) {
            .admin-card.reservas-card { grid-column: span 2; }
        }

        .admin-card {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px; border: 1px solid rgba(192, 214, 239, 0.2);
            transition: all 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .admin-card:hover { border-color: var(--blue-primary); box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 15px rgba(192, 214, 239, 0.2); transform: translateY(-3px); }
        .admin-card h2 { color: var(--blue-primary); font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid rgba(192, 214, 239, 0.3); padding-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--silver-soft); font-size: 12px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(192, 214, 239, 0.2); border-radius: 10px;
            color: var(--silver-main); font-size: 13px; font-family: 'Open Sans', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--blue-primary); box-shadow: 0 0 10px rgba(192, 214, 239, 0.3); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 768px) {
            .row-2 { grid-template-columns: 1fr; gap: 8px; }
        }

        #servicesContainer { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .services-header-row {
            display: flex; gap: 6px; margin-bottom: 4px; padding: 0 6px;
            font-size: 9px; color: var(--silver-soft); text-transform: uppercase;
            letter-spacing: 1px; font-weight: 600;
        }
        .services-header-row .header-name { flex: 3; min-width: 80px; }
        .services-header-row .header-price { flex: 1; min-width: 50px; text-align: center; }
        .services-header-row .header-duration { flex: 1; min-width: 40px; text-align: center; }
        .services-header-row .header-action { width: 32px; flex-shrink: 0; }

        .service-dynamic-item {
            display: flex; align-items: center; gap: 6px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(192, 214, 239, 0.18); border-radius: 10px;
            padding: 8px 10px; transition: all 0.3s;
        }
        .service-dynamic-item:hover { border-color: rgba(192, 214, 239, 0.5); background: rgba(0, 0, 0, 0.6); }
        .service-dynamic-item .field-name { flex: 3; min-width: 80px; }
        .service-dynamic-item .field-price { flex: 1; min-width: 50px; }
        .service-dynamic-item .field-duration { flex: 1; min-width: 40px; }
        .service-dynamic-item .field-action { width: 32px; flex-shrink: 0; display: flex; justify-content: center; }

        .service-dynamic-item input {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(192, 214, 239, 0.25);
            border-radius: 8px; color: var(--silver-main); padding: 8px 6px;
            font-size: 12px; width: 100%; font-family: 'Open Sans', sans-serif;
            text-align: center;
        }
        .service-dynamic-item .field-name input { text-align: left; font-weight: 500; }
        .service-dynamic-item .field-price input { font-weight: 700; color: var(--blue-primary); font-size: 14px; }
        .service-dynamic-item .field-duration input { font-size: 11px; color: var(--silver-soft); }
        .service-dynamic-item input:focus { outline: none; border-color: var(--blue-primary); box-shadow: 0 0 8px rgba(127, 166, 217, 0.2); }

        .btn-remove-service {
            background: rgba(255, 68, 68, 0.2); border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6666; width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer; font-size: 11px; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0; padding: 0;
        }
        .btn-remove-service:hover { background: #ff4444; color: #fff; border-color: #ff4444; box-shadow: 0 0 12px rgba(255, 68, 68, 0.4); transform: scale(1.08); }

        .btn-add-service {
            background: rgba(76, 175, 80, 0.12); border: 1px dashed rgba(76, 175, 80, 0.4);
            color: #66bb6a; padding: 9px; border-radius: 10px; cursor: pointer;
            width: 100%; font-weight: 600; font-size: 12px; margin-top: 4px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-add-service:hover { background: rgba(76, 175, 80, 0.22); border-color: #4caf50; color: #4caf50; transform: translateY(-2px); }

        .btn-save {
            background: linear-gradient(135deg, var(--blue-steel), var(--blue-primary));
            color: #000; border: none; padding: 10px 20px; border-radius: 40px;
            cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 15px; width: 100%;
        }
        .btn-save:hover { transform: scale(0.98); box-shadow: 0 0 20px var(--blue-primary); }
        .btn-primary-card {
            background: linear-gradient(135deg, var(--blue-steel), var(--blue-primary));
            color: #000; border: none; padding: 8px 16px; border-radius: 30px;
            cursor: pointer; font-weight: bold; margin-top: 12px; width: 100%; font-size: 13px;
        }
        .btn-primary-card:hover { box-shadow: 0 0 15px var(--blue-primary); }
        .btn-danger { background: #ff4444; color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 12px; }

        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag { background: rgba(192, 214, 239, 0.2); padding: 3px 10px; border-radius: 20px; font-size: 11px; display: flex; align-items: center; gap: 5px; }
        .tag .remove-tag { cursor: pointer; color: #ff4444; font-weight: bold; }

        .barbeiros-list { margin-top: 12px; max-height: 300px; overflow-y: auto; }
        .barbeiro-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: rgba(0, 0, 0, 0.3); border-radius: 12px;
            margin-bottom: 8px; border: 1px solid rgba(192, 214, 239, 0.1); flex-wrap: wrap;
            gap: 10px;
        }
        .barbeiro-item:hover { border-color: var(--blue-primary); }
        .barbeiro-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue-primary); }
        .barbeiro-info { flex: 1; min-width: 100px; }
        .barbeiro-info strong { color: var(--blue-light); font-size: 14px; }
        .barbeiro-item button { margin: 2px; }

        .upload-area {
            border: 2px dashed rgba(192, 214, 239, 0.3); border-radius: 15px;
            padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px;
        }
        .upload-area:hover { border-color: var(--blue-primary); background: rgba(192, 214, 239, 0.05); }
        .preview-image { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px; display: block; border: 2px solid var(--blue-primary); }

        .bookings-list { max-height: 400px; overflow-y: auto; }
        .booking-item {
            padding: 12px; background: rgba(0, 0, 0, 0.3); border-radius: 10px;
            margin-bottom: 10px; border-left: 3px solid var(--blue-primary);
        }
        .booking-item strong { color: var(--blue-primary); font-size: 14px; }

        .reservas-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .reservas-header h3 { color: var(--blue-light); font-size: 16px; }
        .reservas-header .badge { background: rgba(192, 214, 239, 0.2); padding: 4px 10px; border-radius: 20px; font-size: 12px; }

        .toast-overlay, .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;
        }
        .toast-overlay.show, .modal-overlay.show { display: flex; }
        .toast-box, .modal-box {
            background: rgba(15, 23, 42, 0.98); border: 1px solid var(--blue-primary);
            border-radius: 16px; padding: 25px 20px; text-align: center;
            max-width: 380px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 0.3s ease;
        }
        .toast-icon { font-size: 45px; color: #4caf50; margin-bottom: 12px; }
        .toast-title, .modal-title { color: var(--blue-light); font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .toast-text, .modal-text { color: var(--silver-soft); font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        .modal-input {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--blue-steel); border-radius: 8px;
            color: #fff; font-size: 13px; margin-bottom: 12px;
        }
        .modal-input:focus { outline: none; border-color: var(--blue-primary); }
        .modal-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .toast-btn, .modal-btn {
            flex: 1; padding: 10px 15px; border-radius: 30px; cursor: pointer;
            font-weight: bold; font-size: 14px; transition: all 0.3s; border: none;
            min-width: 100px;
        }
        .btn-confirm { background: linear-gradient(135deg, var(--blue-steel), var(--blue-primary)); color: #000; }
        .btn-confirm:hover { box-shadow: 0 0 20px var(--blue-primary); }
        .btn-cancel { background: transparent; border: 1px solid var(--blue-steel); color: var(--silver-main); }
        .btn-cancel:hover { border-color: var(--blue-primary); color: var(--blue-primary); }
        .btn-delete-confirm { background: #ff4444; color: #fff; }
        .btn-delete-confirm:hover { box-shadow: 0 0 20px #ff4444; }
        .upload-area-small {
            border: 2px dashed rgba(192, 214, 239, 0.3); border-radius: 10px;
            padding: 12px; text-align: center; cursor: pointer; margin-bottom: 12px; font-size: 12px;
        }
        .upload-area-small:hover { border-color: var(--blue-primary); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--blue-steel); border-radius: 10px; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .admin-header { flex-direction: column; text-align: center; padding: 12px 15px; }
            .filter-bar select, .filter-bar button { padding: 8px 12px; font-size: 12px; }
            .admin-card { padding: 15px; }
            .admin-card h2 { font-size: 16px; }
            .service-dynamic-item { flex-wrap: wrap; gap: 5px; padding: 8px; }
            .service-dynamic-item .field-name { flex: 100%; min-width: 100%; }
            .services-header-row { display: none; }
            .booking-item { padding: 10px; font-size: 13px; }
            .barbeiro-item { flex-direction: column; text-align: center; }
            .barbeiro-item img { width: 60px; height: 60px; }
            .barbeiro-info { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box">
            <div class="toast-icon"><i class="fas fa-check-circle"></i></div>
            <div class="toast-title" id="toastTitle">Sucesso!</div>
            <div class="toast-text" id="toastText"></div>
            <button class="toast-btn btn-confirm" onclick="closeToast()">OK</button>
        </div>
    </div>

    <div class="modal-overlay" id="editBarberModal">
        <div class="modal-box">
            <div class="modal-title">Editar Barbeiro</div>
            <div class="upload-area-small" onclick="document.getElementById('editBarberPhoto').click()">
                <i class="fas fa-camera"></i> Trocar foto
                <input type="file" id="editBarberPhoto" accept="image/*" style="display: none" onchange="previewEditPhoto(this)">
            </div>
            <div id="editPhotoPreview" style="text-align:center;margin-bottom:10px;"></div>
            <input type="text" id="editBarberName" class="modal-input" placeholder="Nome do barbeiro">
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeEditModal()">Cancelar</button>
                <button class="modal-btn btn-confirm" onclick="saveEditBarber()">Salvar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteConfirmModal">
        <div class="modal-box">
            <div class="toast-icon" style="color:#ff4444;"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="modal-title">Confirmar Exclusão</div>
            <div class="modal-text" id="deleteText">Tem certeza que deseja remover este barbeiro?</div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
                <button class="modal-btn btn-delete-confirm" id="confirmDeleteBtn">Remover</button>
            </div>
        </div>
    </div>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> PAINEL DO GESTOR</h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>
        </div>

        <div class="filter-bar">
            <select id="filterMonth">
                <option value="">Todos os meses</option>
                <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                <option value="3">Março</option><option value="4" selected>Abril</option>
                <option value="5">Maio</option><option value="6">Junho</option>
                <option value="7">Julho</option><option value="8">Agosto</option>
                <option value="9">Setembro</option><option value="10">Outubro</option>
                <option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
            <select id="filterYear">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
            <button onclick="filterBookings()"><i class="fas fa-search"></i> FILTRAR</button>
            <button onclick="loadTodaysBookings()"><i class="fas fa-calendar-day"></i> HOJE</button>
            <button onclick="loadAllBookings()"><i class="fas fa-list"></i> TODAS</button>
        </div>

        <div class="admin-grid">
            <!-- Card de Reservas - PRIMEIRO (destaque) -->
            <div class="admin-card reservas-card">
                <h2><i class="fas fa-calendar-alt"></i> RESERVAS DO DIA</h2>
                <div class="reservas-header">
                    <h3 id="reservasTitle">Reservas de Hoje</h3>
                    <span class="badge" id="reservasCount">0 reservas</span>
                </div>
                <div id="bookingsList" class="bookings-list"></div>
                <button class="btn-primary-card" onclick="loadTodaysBookings()"><i class="fas fa-sync-alt"></i> ATUALIZAR</button>
            </div>

            <!-- Cards de Configuração -->
            <div class="admin-card">
                <h2><i class="fas fa-tag"></i> PREÇOS DOS SERVIÇOS</h2>
                <div id="servicesContainer"></div>
                <button class="btn-add-service" onclick="addNewService()"><i class="fas fa-plus"></i> ADICIONAR SERVIÇO</button>
                <button class="btn-save" onclick="saveServices()">SALVAR SERVIÇOS</button>
            </div>

            <div class="admin-card">
                <h2><i class="fas fa-clock"></i> HORÁRIOS DE FUNCIONAMENTO</h2>
                <div class="row-2">
                    <div class="form-group"><label>Segunda-feira</label><input type="text" id="hourMon" value="FECHADO"></div>
                    <div class="form-group"><label>Terça-feira</label><input type="text" id="hourTue" value="09:00 - 20:00"></div>
                    <div class="form-group"><label>Quarta-feira</label><input type="text" id="hourWed" value="09:00 - 20:00"></div>
                    <div class="form-group"><label>Quinta-feira</label><input type="text" id="hourThu" value="09:00 - 21:00"></div>
                    <div class="form-group"><label>Sexta-feira</label><input type="text" id="hourFri" value="09:00 - 21:00"></div>
                    <div class="form-group"><label>Sábado</label><input type="text" id="hourSat" value="09:00 - 18:00"></div>
                </div>
                <button class="btn-save" onclick="saveHours()">SALVAR HORÁRIOS</button>
            </div>

            <div class="admin-card">
                <h2><i class="fas fa-ban"></i> DATAS BLOQUEADAS</h2>
                <div class="form-group"><label>Adicionar data bloqueada</label><input type="date" id="blockedDateInput"></div>
                <button class="btn-primary-card" onclick="addBlockedDate()">BLOQUEAR DATA</button>
                <div class="tag-container" id="blockedDatesTags"></div>
            </div>

            <div class="admin-card">
                <h2><i class="fas fa-phone"></i> CONTATO E ENDEREÇO</h2>
                <div class="form-group"><label>WhatsApp</label><input type="text" id="adminPhone" value="(11) 94848-4457"></div>
                <div class="form-group"><label>Instagram</label><input type="text" id="adminInstagram" value="@barbeariatrenches"></div>
                <div class="form-group"><label>Endereço completo</label><textarea id="adminAddress" rows="3">Av. Maj. Melo, 35
Vila Nova Aparecida
Mogi das Cruzes - SP</textarea></div>
                <button class="btn-save" onclick="saveContact()">SALVAR CONTATO</button>
            </div>

            <div class="admin-card">
                <h2><i class="fas fa-users"></i> EQUIPE DE BARBEIROS</h2>
                <div id="previewContainer" style="text-align: center;"></div>
                <div class="upload-area" onclick="document.getElementById('barbeiroPhoto').click()">
                    <i class="fas fa-camera" style="font-size: 25px; margin-bottom: 8px; display: block;"></i>
                    SELECIONAR FOTO
                    <input type="file" id="barbeiroPhoto" accept="image/*" style="display: none" onchange="previewPhoto(this)">
                </div>
                <div class="form-group"><input type="text" id="barbeiroName" placeholder="Nome do barbeiro"></div>
                <button class="btn-primary-card" onclick="addBarbeiro()">SALVAR BARBEIRO</button>
                <div id="barbeirosList" class="barbeiros-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let allBookings = [], currentPhotoPreview = null;
        let editBarberIndex = null, editPhotoPreview = null, deleteBarberIndex = null;

        function showToast(t,m){document.getElementById('toastTitle').textContent=t;document.getElementById('toastText').textContent=m;document.getElementById('toastOverlay').classList.add('show');}
        function closeToast(){document.getElementById('toastOverlay').classList.remove('show');}
        document.addEventListener('DOMContentLoaded',function(){document.getElementById('toastOverlay').addEventListener('click',function(e){if(e.target===this)closeToast();});});

        function openEditModal(i){editBarberIndex=i;editPhotoPreview=null;document.getElementById('editBarberName').value=barbeiros[i].name;document.getElementById('editPhotoPreview').innerHTML='';document.getElementById('editBarberPhoto').value='';document.getElementById('editBarberModal').classList.add('show');}
        function closeEditModal(){document.getElementById('editBarberModal').classList.remove('show');editBarberIndex=null;editPhotoPreview=null;}
        function previewEditPhoto(input){const f=input.files[0];if(f){const r=new FileReader();r.onload=function(e){editPhotoPreview=e.target.result;document.getElementById('editPhotoPreview').innerHTML='<img src="'+editPhotoPreview+'" class="preview-image">';};r.readAsDataURL(f);}}
        function saveEditBarber(){const nn=document.getElementById('editBarberName').value.trim();if(!nn){showToast('Atenção','Digite um nome.');return;}barbeiros[editBarberIndex].name=nn;if(editPhotoPreview)barbeiros[editBarberIndex].photo=editPhotoPreview;localStorage.setItem('barbeiros',JSON.stringify(barbeiros));notifyIndexUpdate('barbeiros');renderBarbeiros();closeEditModal();showToast('Barbeiro Atualizado','Nome e foto atualizados.');}

        function openDeleteModal(i){deleteBarberIndex=i;document.getElementById('deleteText').textContent='Tem certeza que deseja remover '+barbeiros[i].name+'?';document.getElementById('deleteConfirmModal').classList.add('show');}
        function closeDeleteModal(){document.getElementById('deleteConfirmModal').classList.remove('show');deleteBarberIndex=null;}
        document.getElementById('confirmDeleteBtn').addEventListener('click',function(){if(deleteBarberIndex!==null){const n=barbeiros[deleteBarberIndex].name;barbeiros.splice(deleteBarberIndex,1);localStorage.setItem('barbeiros',JSON.stringify(barbeiros));notifyIndexUpdate('barbeiros');renderBarbeiros();closeDeleteModal();showToast('Barbeiro Removido',n+' foi removido.');}});
        document.getElementById('editBarberModal').addEventListener('click',function(e){if(e.target===this)closeEditModal();});
        document.getElementById('deleteConfirmModal').addEventListener('click',function(e){if(e.target===this)closeDeleteModal();});

        function notifyIndexUpdate(k){localStorage.setItem('__lastUpdate',Date.now().toString());window.dispatchEvent(new StorageEvent('storage',{key:k,newValue:localStorage.getItem(k)}));}

        const DEFAULT_SERVICES=[{name:'Cabelo',price:40,duration:45,id:'cabelo'},{name:'Barba',price:40,duration:30,id:'barba'},{name:'Cabelo e Barba',price:80,duration:75,id:'combo'},{name:'Pacote Trenches',price:125,duration:90,id:'pacote'}];
        function getServices(){if(window._tempServices&&window._tempServices.length>0)return window._tempServices;const s=localStorage.getItem('adminSettings');if(s){try{const p=JSON.parse(s);if(p.services&&p.services.length>0){window._tempServices=p.services;return p.services;}}catch(e){}}window._tempServices=[...DEFAULT_SERVICES];return[...DEFAULT_SERVICES];}
        function saveServicesToSettings(sv){let s=JSON.parse(localStorage.getItem('adminSettings')||'{}');s.prices={};sv.forEach(x=>{s.prices[x.id]=x.price;});s.services=sv;localStorage.setItem('adminSettings',JSON.stringify(s));window._tempServices=sv;notifyIndexUpdate('adminSettings');showToast('Serviços Atualizados','Serviços e preços salvos.');}
        function renderServices(){const c=document.getElementById('servicesContainer');if(!c)return;const sv=getServices();c.innerHTML=sv.map((s,i)=>`<div class="service-dynamic-item"><div class="field-name"><input type="text" value="${s.name}" onchange="updateServiceField(${i},'name',this.value)"></div><div class="field-price"><input type="number" value="${s.price}" step="5" onchange="updateServiceField(${i},'price',parseInt(this.value)||0)"></div><div class="field-duration"><input type="number" value="${s.duration}" step="5" onchange="updateServiceField(${i},'duration',parseInt(this.value)||0)"></div><div class="field-action"><button class="btn-remove-service" onclick="removeService(${i})"><i class="fas fa-trash"></i></button></div></div>`).join('');}
        function updateServiceField(i,f,v){const s=getServices();if(i>=0&&i<s.length){s[i][f]=v;window._tempServices=s;}}
        function addNewService(){const s=getServices();s.push({name:'Novo Serviço',price:50,duration:30,id:'svc_'+Date.now()});window._tempServices=s;renderServices();}
        function removeService(i){const s=getServices();if(s.length<=1){showToast('Atenção','Mantenha pelo menos um serviço.');return;}s.splice(i,1);window._tempServices=s;renderServices();showToast('Serviço Removido','Removido da lista.');}
        function saveServices(){const s=getServices();for(const x of s){if(!x.name||x.name.trim()===''){showToast('Atenção','Nome obrigatório.');return;}if(!x.price||x.price<=0){showToast('Atenção','Preço inválido.');return;}if(!x.duration||x.duration<=0){showToast('Atenção','Duração inválida.');return;}}saveServicesToSettings(s);}

        function loadAllSettings(){const s=localStorage.getItem('adminSettings');if(s){const p=JSON.parse(s);if(p.hours){document.getElementById('hourMon').value=p.hours.mon||'FECHADO';document.getElementById('hourTue').value=p.hours.tue||'09:00 - 20:00';document.getElementById('hourWed').value=p.hours.wed||'09:00 - 20:00';document.getElementById('hourThu').value=p.hours.thu||'09:00 - 21:00';document.getElementById('hourFri').value=p.hours.fri||'09:00 - 21:00';document.getElementById('hourSat').value=p.hours.sat||'09:00 - 18:00';}if(p.phone)document.getElementById('adminPhone').value=p.phone;if(p.instagram)document.getElementById('adminInstagram').value=p.instagram;if(p.address)document.getElementById('adminAddress').value=p.address;if(p.services)window._tempServices=p.services;renderBlockedDates(p.blockedDates||[]);}renderServices();}
        function saveHours(){let s=JSON.parse(localStorage.getItem('adminSettings')||'{}');s.hours={mon:document.getElementById('hourMon').value,tue:document.getElementById('hourTue').value,wed:document.getElementById('hourWed').value,thu:document.getElementById('hourThu').value,fri:document.getElementById('hourFri').value,sat:document.getElementById('hourSat').value};localStorage.setItem('adminSettings',JSON.stringify(s));notifyIndexUpdate('adminSettings');showToast('Horários Atualizados','Horários salvos.');}
        function addBlockedDate(){const i=document.getElementById('blockedDateInput'),d=i.value;if(!d){showToast('Atenção','Selecione uma data.');return;}let s=JSON.parse(localStorage.getItem('adminSettings')||'{}');if(!s.blockedDates)s.blockedDates=[];if(s.blockedDates.includes(d)){showToast('Atenção','Data já bloqueada.');return;}s.blockedDates.push(d);s.blockedDates.sort();localStorage.setItem('adminSettings',JSON.stringify(s));notifyIndexUpdate('adminSettings');i.value='';renderBlockedDates(s.blockedDates);}
        function removeBlockedDate(d){let s=JSON.parse(localStorage.getItem('adminSettings')||'{}');s.blockedDates=(s.blockedDates||[]).filter(x=>x!==d);localStorage.setItem('adminSettings',JSON.stringify(s));notifyIndexUpdate('adminSettings');renderBlockedDates(s.blockedDates);}
        function renderBlockedDates(d){const c=document.getElementById('blockedDatesTags');if(!c)return;if(d.length===0){c.innerHTML='<p style="color:var(--silver-soft);font-size:11px;margin-top:8px;">Nenhuma data bloqueada</p>';return;}c.innerHTML=d.map(x=>`<span class="tag"><i class="fas fa-calendar-times"></i> ${x.split('-').reverse().join('/')}<span class="remove-tag" onclick="removeBlockedDate('${x}')">&times;</span></span>`).join('');}
        function saveContact(){let s=JSON.parse(localStorage.getItem('adminSettings')||'{}');s.phone=document.getElementById('adminPhone').value;s.instagram=document.getElementById('adminInstagram').value;s.address=document.getElementById('adminAddress').value;localStorage.setItem('adminSettings',JSON.stringify(s));notifyIndexUpdate('adminSettings');showToast('Contato Atualizado','WhatsApp, Instagram e endereço salvos.');}

        let barbeiros=JSON.parse(localStorage.getItem('barbeiros')||'[]');
        function previewPhoto(i){const f=i.files[0];if(f){const r=new FileReader();r.onload=function(e){currentPhotoPreview=e.target.result;document.getElementById('previewContainer').innerHTML='<img src="'+currentPhotoPreview+'" class="preview-image">';};r.readAsDataURL(f);}}
        function addBarbeiro(){const n=document.getElementById('barbeiroName').value.trim();if(!n){showToast('Atenção','Digite o nome.');return;}if(!currentPhotoPreview){showToast('Atenção','Selecione uma foto.');return;}barbeiros.push({name:n,photo:currentPhotoPreview,id:Date.now()});localStorage.setItem('barbeiros',JSON.stringify(barbeiros));notifyIndexUpdate('barbeiros');document.getElementById('barbeiroName').value='';document.getElementById('previewContainer').innerHTML='';currentPhotoPreview=null;document.getElementById('barbeiroPhoto').value='';renderBarbeiros();showToast('Barbeiro Adicionado',n+' foi adicionado.');}
        function renderBarbeiros(){const c=document.getElementById('barbeirosList');if(!c)return;if(barbeiros.length===0){c.innerHTML='<p style="color:var(--silver-soft);text-align:center;">Nenhum barbeiro cadastrado</p>';return;}c.innerHTML=barbeiros.map((b,i)=>`<div class="barbeiro-item"><img src="${b.photo}" onerror="this.src='images/avatar.png'"><div class="barbeiro-info"><strong>${b.name}</strong></div><button onclick="openEditModal(${i})" style="background:#ff9800;border:none;padding:5px 12px;border-radius:20px;cursor:pointer;color:black;"><i class="fas fa-edit"></i></button><button onclick="openDeleteModal(${i})" class="btn-danger">X</button></div>`).join('');}

        async function loadAllBookings(){const c=document.getElementById('bookingsList');c.innerHTML='<p style="color:var(--silver-soft);">Carregando...</p>';try{const r=await fetch(API_URL+'/api/bookings/all');if(r.ok){allBookings=await r.json();displayBookings(allBookings);document.getElementById('reservasTitle').innerHTML='Todas as Reservas';}}catch(e){c.innerHTML='<p style="color:#ff8888;">Erro de conexão</p>';}}
        async function loadTodaysBookings(){const c=document.getElementById('bookingsList');c.innerHTML='<p style="color:var(--silver-soft);">Carregando...</p>';try{const r=await fetch(API_URL+'/api/bookings/all');if(r.ok){const b=await r.json();const today=new Date().toISOString().split('T')[0];displayBookings(b.filter(x=>x.date===today));document.getElementById('reservasTitle').innerHTML='Reservas de Hoje ('+today.split('-').reverse().join('/')+')';}}catch(e){c.innerHTML='<p style="color:#ff8888;">Erro de conexão</p>';}}
        function filterBookings(){const m=document.getElementById('filterMonth').value,y=document.getElementById('filterYear').value;if(!m){showToast('Atenção','Selecione um mês.');return;}const f=allBookings.filter(b=>{const[by,bm]=b.date.split('-');return by===y&&bm===m;});const mn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];displayBookings(f);document.getElementById('reservasTitle').innerHTML='Reservas - '+mn[parseInt(m)-1]+' '+y;}
        function displayBookings(b){const c=document.getElementById('bookingsList'),ce=document.getElementById('reservasCount');if(!c)return;if(b.length===0){c.innerHTML='<p style="color:var(--silver-soft);">Nenhuma reserva</p>';ce.textContent='0 reservas';return;}b.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));ce.textContent=b.length+' reserva'+(b.length!==1?'s':'');c.innerHTML=b.map(x=>`<div class="booking-item"><strong><i class="far fa-calendar-alt"></i> ${x.date.split('-').reverse().join('/')}</strong> - <strong><i class="far fa-clock"></i> ${x.time}</strong><br><i class="fas fa-user"></i> Cliente: ${x.userName}<br><i class="fas fa-cut"></i> Serviço: ${x.service}<br><i class="fas fa-phone"></i> <small>${x.userId||'N/E'}</small></div>`).join('');}

        function logout(){window.location.href='index.html';}
        async function init(){loadAllSettings();renderBarbeiros();renderBlockedDates((JSON.parse(localStorage.getItem('adminSettings')||'{}')).blockedDates||[]);await loadTodaysBookings();}
        init();
    </script>
</body>
</html>
